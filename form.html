<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Appointment Scheduler</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
        <style>
            body {
                background-color: #e3f2fd;
            }
            .row.bg-light {
                background-color: #bbdefb !important;
                padding: 15px;
                border-radius: 8px;
                align-items: center;
            }
            .logo {
                width: 60px;
                height: 60px;
                border-radius: 8px;
                border: 2px solid #90caf9;
                object-fit: cover;
            }
            h1 {
                color: #1e88e5;
                font-weight: 600;
            }
            .form-control, .form-select, textarea {
                border: 1px solid #90caf9;
                background-color: #e3f2fd;
            }
            .form-control:focus, .form-select:focus, textarea:focus {
                border-color: #42a5f5;
                box-shadow: 0 0 0 0.2rem rgba(66,165,245,0.25);
            }
            .btn-primary {
                background-color: #42a5f5;
                border-color: #42a5f5;
            }
            .btn-primary:hover {
                background-color: #64b5f6;
                border-color: #64b5f6;
            }
            #calendar {
                background-color: #ffffff;
                border-radius: 8px;
                padding: 10px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            }
            .selected-day{
                background: #66b3ff !important;
                color:white !important;
            }
            .time-options label{
                margin-right:25px;
            }
            .table {
                background-color: #bbdefb;
                border-radius: 8px;
            }
            .table th {
                background-color: #90caf9;
                color: white;
            }
            input[type="email"] {
                display: inline-block;
                width: auto;
                margin-right: 10px;
            }
            input[type=range] {
                -webkit-appearance: none;
                width: 100%;
                background: transparent;
            }
            input[type=range]::-webkit-slider-runnable-track {
                height: 8px;
                background: #ffffff;
                border-radius: 4px;
            }
            input[type=range]::-moz-range-track {
                height: 8px;
                background: #ffffff;
                border-radius: 4px;
            }
            input[type=range]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 20px;
                height: 20px;
                background: #42a5f5;
                border-radius: 50%;
                border: 2px solid #ffffff;
                margin-top: -6px;
                cursor: pointer;
            }
            input[type=range]::-moz-range-thumb {
                width: 20px;
                height: 20px;
                background: #42a5f5;
                border-radius: 50%;
                border: 2px solid #ffffff;
                cursor: pointer;
            }
            input[type=range]:hover::-webkit-slider-thumb {
                background: #64b5f6;
            }
            input[type=range]:hover::-moz-range-thumb {
                background: #64b5f6;
            }
        </style>
    </head>
    <body>
        <div class="row bg-light mb-3">
            <div class="col-auto">
                <img src="assets/coffee-cup-clipart.png" class="logo" alt="Logo">
            </div>
            <div class="col">
                <h1 class="m-0">The Coffee Café</h1>
            </div>
        </div>
        <div style="margin-left:10%; margin-right:10%;">
            <form>
                <div class="row mb-4 g-4">
                    <div class="col-md-5">
                        <div id="calendar"></div>
                    </div>
                    <div class="col-md-7">
                        <div class="mb-3">
                            <label class="form-label" for="peopleSlider">Number of People: <span id="peopleValue">2</span></label>
                            <input type="range" class="form-range" id="peopleSlider" min="2" max="20" step="1" value="2">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Type</label>
                            <select class="form-select">
                                <option>Conference</option>
                                <option>Birthday Party</option>
                                <option>Club Meeting</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Menu Substitutions</label>
                            <select class="form-select">
                                <option>None</option>
                                <option>Vegetarian</option>
                                <option>Ketogenic</option>
                                <option>Vegan</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Special Requests</label>
                            <textarea class="form-control" rows="4"></textarea>
                        </div>
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col">
                        <table class="table table-bordered text-center">
                            <thead>
                                <tr>
                                    <th id="selectedDate">Select a Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>
                                        <div class="d-flex justify-content-center time-options flex-wrap gap-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="time">
                                                <label class="form-check-label">9 AM – 12 PM</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="time">
                                                <label class="form-check-label">12 PM – 3 PM</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="time">
                                                <label class="form-check-label">3 PM – 6 PM</label>
                                            </div>
                                            <div class="form-check" id="eveningSlot">
                                                <input class="form-check-input" type="radio" name="time">
                                                <label class="form-check-label">6 PM – 9 PM</label>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="row">
                    <div class="col text-end">
                        <label class="me-2">Email:</label>
                        <input class="form-control d-inline-block w-auto me-2" type="email">
                        <button class="btn btn-primary">Submit</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">Success!</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p id="successMessage"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" onclick="window.location.href = 'index.html'">OK</button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const slider = document.getElementById("peopleSlider");
            const output = document.getElementById("peopleValue");
            output.innerText = slider.value;
            slider.addEventListener("input", function () {
                output.innerText = this.value;
            });
            let selectedCell = null;
            document.addEventListener('DOMContentLoaded', function () {
                const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                    initialView: 'dayGridMonth',
                    headerToolbar: {
                        left: '',
                        center: 'title',
                        right: 'prev,next'
                    },
                    dateClick: function (info) {
                        let parts = info.dateStr.split('-');
                        let date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                        let formattedDate = date.toLocaleDateString("en-US", {
                            weekday: "long",
                            month: "long",
                            day: "numeric",
                            year: "numeric"
                        });
                        document.getElementById("selectedDate").innerText = formattedDate;
                        if (selectedCell) {
                            selectedCell.classList.remove("selected-day");
                        }
                        selectedCell = info.dayEl;
                        selectedCell.classList.add("selected-day");
                        let weekday = date.getDay();
                        let eveningSlot = document.getElementById("eveningSlot");
                        eveningSlot.style.display = (weekday === 0 || weekday === 6) ? "none" : "block";
                    }
                });
                calendar.render();

                const form = document.querySelector('form');
                const emailInput = document.querySelector('input[type="email"]');
                const successMessage = document.getElementById('successMessage');

                form.addEventListener('submit', function (e) {
                    e.preventDefault(); // Prevent form submission

                    const email = emailInput.value.trim();
                    if (email === "") {
                        alert("Please enter your email.");
                        return;
                    }

                    successMessage.innerHTML = `
        A confirmation email has been sent to <strong>${email}</strong>.<br>
        You will soon be notified with the status of your reservation.
    `;

                    const modal = new bootstrap.Modal(document.getElementById('successModal'));
                    modal.show();

                    form.reset();
                });
            });
        </script>

        <script>
            const loginBtn = document.querySelector('.btn-primary');
            const emailInput = document.querySelector('input[type="text"]');
            const passwordInput = document.querySelector('input[type="password"]');

            loginBtn.addEventListener('click', () => {
                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value; // you can handle password check if needed

                if (email === 'staff@staff.com') {
                    window.location.href = 'staff.html';
                } else if (email === 'manager@manager.com') {
                    window.location.href = 'manager.html';
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
