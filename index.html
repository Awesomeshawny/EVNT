<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.logo {
    width: 300px;
    height: 300px;
    object-fit: cover;
}

.title {
    font-size: 2.5rem;
    font-weight: bold;
}
</style>

</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="text-center">
    
    <div class="title mb-0">EVNT</div>

    <img src="assets/coffee-cup-clipart.png" class="logo mb-4" alt="Logo">

    <div class="d-flex justify-content-center align-items-stretch gap-2 mb-5">

    <div class="d-flex flex-column align-items-center gap-2 mb-3">

        <input type="text" class="form-control" placeholder="Email" style="width:250px;">
        <input type="password" class="form-control" placeholder="Password" style="width:250px;">
        <button class="btn btn-primary w-100" style="max-width:250px;">Login</button>

    </div>

    </div>

    <div class="mt-5">
        <button class="btn btn-secondary mb-1">Click here</button>
        <div class="text-muted">Trying to book an event?</div>
    </div>

</div>

</body>
</html>
