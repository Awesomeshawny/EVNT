<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background-color: #e3f2fd;
            }

            .text-center {
                background-color: #bbdefb;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            }

            .logo {
                width: 200px;
                height: 200px;
                object-fit: cover;
                border-radius: 12px;
                border: 2px solid #90caf9;
            }

            .title {
                font-size: 2.5rem;
                font-weight: bold;
                color: #1e88e5;
                margin-bottom: 20px;
            }

            .form-control {
                border: 1px solid #90caf9;
                background-color: #e3f2fd;
            }

            .form-control:focus {
                border-color: #42a5f5;
                box-shadow: 0 0 0 0.2rem rgba(66,165,245,0.25);
            }

            .btn-primary {
                background-color: #42a5f5;
                border-color: #42a5f5;
            }

            .btn-primary:hover {
                background-color: #64b5f6;
                border-color: #64b5f6;
            }

            .btn-secondary {
                background-color: #42a5f5;
                border-color: #90caf9;
            }

            .btn-secondary:hover {
                background-color: #64b5f6;
                border-color: #64b5f6;
            }

            #searchContainer {
                background-color: #bbdefb;
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #90caf9;
            }

            .form-select {
                background-color: #e3f2fd;
                border-color: #90caf9;
            }

            .form-select option:hover {
                background-color: #90caf9;
                color: #fff;
            }

            .text-muted {
                color: #1e88e5 !important;
            }
        </style>

    </head>

    <body class="d-flex justify-content-center align-items-center vh-100">

        <div class="text-center">

            <div class="title">EVNT</div>

            <img src="assets/coffee-cup-clipart.png" class="logo mb-4" alt="Logo">

            <div class="d-flex justify-content-center align-items-stretch gap-2 mb-5">

                <div class="d-flex flex-column align-items-center gap-2 mb-3">

                    <input type="text" class="form-control" placeholder="Email" style="width:250px;">
                    <input type="password" class="form-control" placeholder="Password" style="width:250px;">
                    <button class="btn btn-primary w-100" style="max-width:250px;">Login</button>

                </div>

            </div>

            <div class="mt-5">
                <div class="text-muted mb-2">Trying to book an event?</div>
                <button id="toggleSearch" class="btn btn-secondary mb-1">Click here</button>


                <div id="searchContainer" style="display:none;">
                    <input type="text" id="searchInput" class="form-control mb-1" placeholder="Search...">
                    <select id="searchDropdown" class="form-select" size="5">
                        <option>The Coffee Café</option>
                        <option>Tony's Bar and Grill</option>
                        <option>Soup & Supper</option>
                        <option>Cappuccino Express</option>
                        <option>The Baron Bakery</option>
                    </select>
                </div>
            </div>

        </div>

        <script>
            const toggleBtn = document.getElementById('toggleSearch');
            const searchContainer = document.getElementById('searchContainer');
            const searchInput = document.getElementById('searchInput');
            const searchDropdown = document.getElementById('searchDropdown');

            toggleBtn.addEventListener('click', () => {
                searchContainer.style.display = searchContainer.style.display === 'none' ? 'block' : 'none';
                searchInput.focus();
            });

            searchInput.addEventListener('input', () => {
                const filter = searchInput.value.toLowerCase();
                for (let i = 0; i < searchDropdown.options.length; i++) {
                    const option = searchDropdown.options[i];
                    option.style.display = option.text.toLowerCase().includes(filter) ? '' : 'none';
                }
            });

            searchDropdown.addEventListener('change', () => {
                if (searchDropdown.value) {
                    window.location.href = 'form.html';
                }
            });
        </script>

        <script>
            const loginBtn = document.querySelector('.btn-primary');
            const emailInput = document.querySelector('input[type="text"]');
            const passwordInput = document.querySelector('input[type="password"]');

            loginBtn.addEventListener('click', () => {
                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value; // you can handle password check if needed

                if (email === 'staff@staff.com') {
                    window.location.href = 'staff.html';
                } else if (email === 'manager@manager.com') {
                    window.location.href = 'manager.html';
                }
            });
        </script>

    </body>
</html>
