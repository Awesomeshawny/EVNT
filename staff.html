<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Staff View</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
        <style>
            body {
                background-color: #e3f2fd;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .row.bg-light {
                background-color: #bbdefb !important;
                padding: 15px;
                border-radius: 8px;
                align-items: center;
            }

            .logo {
                width: 60px;
                height: 60px;
                border-radius: 8px;
                border: 2px solid #90caf9;
                object-fit: cover;
            }

            h1 {
                color: #1e88e5;
                font-weight: 600;
                margin: 20px 0;
            }

            #calendar {
                background-color: #ffffff;
                border-radius: 8px;
                padding: 10px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            }

            .selected-day {
                background: #66b3ff !important;
                color: white !important;
            }

            #selectedDate {
                margin-top: 20px;
                font-size: 1.2rem;
                font-weight: 500;
                color: #333;
            }

            #eventsList {
                margin-top: 10px;
                background-color: #ffffff;
                border-radius: 8px;
                padding: 15px;
                min-height: 200px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            }

            .event-item {
                padding: 8px 12px;
                border-bottom: 1px solid #e0e0e0;
                cursor: pointer;
                transition: background 0.2s;
            }

            .event-item:hover {
                background-color: #d0e7ff;
            }

            .event-item:last-child {
                border-bottom: none;
            }

            .selected-event {
                background-color: #66b3ff !important;
                color: white;
            }

            #eventDetails {
                background-color: #ffffff;
                border-radius: 8px;
                padding: 15px;
                min-height: 250px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            }

            .container-flex {
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
            }

            .calendar-column {
                flex: 1 1 400px;
            }

            .details-column {
                flex: 1 1 400px;
            }

            @media (max-width: 768px) {
                .container-flex {
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>

        <div class="row bg-light mb-3">
            <div class="col-auto">
                <img src="assets/coffee-cup-clipart.png" class="logo" alt="Logo">
            </div>
            <div class="col">
                <h1 class="m-0">Upcoming Events</h1>
            </div>
        </div>

        <div class="container container-flex mb-4">
            <div class="details-column">
                <div id="eventDetails">
                    <p style="color:#777;">Select an event to see details here.</p>
                </div>
            </div>
            <div class="calendar-column">
                <div id="calendar"></div>
                <div id="selectedDate">Select a date</div>
                <div id="eventsList">
                    <p style="color:#777;">No events yet.</p>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const calendarEl = document.getElementById('calendar');
                const selectedDateEl = document.getElementById('selectedDate');
                const eventsListEl = document.getElementById('eventsList');
                const eventDetailsEl = document.getElementById('eventDetails');

                let selectedCell = null;
                let selectedEventDiv = null; // store currently selected event

                // Sample events
                const events = {
                    "2026-03-14": [
                        {title: "CapitaCorp Executive Lunch", time: "9:00 AM – 10:00 AM", groupSize: 10, working: false},
                        {title: "Anna's Birthday", time: "5:00 PM – 7:00 PM", groupSize: 10, working: true},
                        {title: "Coffee Tasting", time: "4:00 PM – 6:00 PM", groupSize: 12, working: false}
                    ],
                    "2026-03-15": [
                        {title: "Board Game Night", time: "5:00 PM – 8:00 PM", groupSize: 10, working: false}
                    ],
                    "2026-03-16": [
                        {title: "Book Club Meeting", time: "3:00 PM – 4:30PM", groupSize: 8, working: false}
                    ]
                };

                function displayEventDetails(event) {
                    const involvementText = event.working ? "You are working this" : "You are not working this";
                    const fullDetailsDisabled = event.working ? "" : "disabled";
                    eventDetailsEl.innerHTML = `
                        <h5>Event Preview</h5>
                        <p><strong>Event Title:</strong> ${event.title}</p>
                        <p><strong>Event Involvement:</strong> ${involvementText}</p>
                        <p><strong>Event Time:</strong> ${event.time}</p>
                        <p><strong>Group Size:</strong> ${event.groupSize}</p>
                        <button class="btn btn-secondary" ${fullDetailsDisabled} onclick="window.location.href='details.html'">
                            Full Details
                        </button>
                    `;
                }

                function populateEventsList(dateStr) {
                    eventsListEl.innerHTML = "";
                    selectedEventDiv = null; // reset selected event highlight

                    if (events[dateStr] && events[dateStr].length > 0) {
                        events[dateStr].forEach(ev => {
                            const div = document.createElement('div');
                            div.classList.add('event-item');
                            div.textContent = ev.title;
                            div.addEventListener('click', () => {
                                // Remove highlight from previously selected event
                                if (selectedEventDiv)
                                    selectedEventDiv.classList.remove('selected-event');

                                selectedEventDiv = div;
                                div.classList.add('selected-event');
                                displayEventDetails(ev);
                            });
                            eventsListEl.appendChild(div);
                        });
                    } else {
                        eventsListEl.innerHTML = "<p style='color:#777;'>No events for this day.</p>";
                        eventDetailsEl.innerHTML = "<p style='color:#777;'>Select an event to see details here.</p>";
                    }
                }

                const calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    headerToolbar: {
                        left: '',
                        center: 'title',
                        right: 'prev,next'
                    },
                    dateClick: function (info) {
                        if (selectedCell) {
                            selectedCell.classList.remove('selected-day');
                        }
                        selectedCell = info.dayEl;
                        selectedCell.classList.add('selected-day');

                        const date = info.date;
                        const formattedDate = date.toLocaleDateString('en-US', {
                            weekday: 'long',
                            month: 'long',
                            day: 'numeric',
                            year: 'numeric'
                        });
                        selectedDateEl.textContent = formattedDate;

                        populateEventsList(info.dateStr);
                    }
                });

                calendar.render();
            });
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
